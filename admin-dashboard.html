<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Admin Portal</h1>
            <div class="nav-menu">
                <span class="user-name">Admin</span>
                <button onclick="exportData()" class="btn-secondary">Export Data</button>
                <button onclick="App.logout()" class="btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>Admin Dashboard</h2>
            <div class="header-actions">
                <button onclick="showTab('complaints')" class="tab-btn active" id="complaintsTab">Complaints</button>
                <button onclick="showTab('students')"   class="tab-btn"        id="studentsTab">Students</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalComplaints">0</div>
                <div class="stat-label">Total Complaints</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-number" id="pendingComplaints">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card in-progress">
                <div class="stat-number" id="inProgressComplaints">0</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card resolved">
                <div class="stat-number" id="resolvedComplaints">0</div>
                <div class="stat-label">Resolved</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalStudents">0</div>
                <div class="stat-label">Total Students</div>
            </div>
        </div>

        <div id="complaintsSection" class="tab-content">
            <div class="filter-section">
                <input type="text" id="searchComplaints" placeholder="Search complaints..." class="search-input">
                <select id="statusFilter" class="filter-select">
                    <option value="">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Rejected">Rejected</option>
                </select>
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Transport">Transport</option>
                    <option value="Facilities">Facilities</option>
                    <option value="Academics">Academics</option>
                    <option value="Hostel">Hostel</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="complaintsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="studentsSection" class="tab-content" style="display: none;">
            <div class="filter-section">
                <input type="text" id="searchStudents" placeholder="Search students..." class="search-input">
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Complaints</th>
                            <th>Registered</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="complaintModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <span class="close-btn" onclick="closeComplaintModal()">&times;</span>
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>

            <div class="modal-actions">
                <h4>Update Status</h4>
                <select id="statusUpdate" class="form-control">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Rejected">Rejected</option>
                </select>

                <h4>Admin Notes</h4>
                <textarea id="adminNotes" class="form-control" rows="3" placeholder="Add notes for the student..."></textarea>

                <button onclick="updateComplaintStatus()" class="btn-primary">Update Complaint</button>
                <button onclick="deleteComplaint()" class="btn-danger">Delete Complaint</button>
            </div>
        </div>
    </div>

    <script src="src/models/User.js"></script>
    <script src="src/models/Student.js"></script>
    <script src="src/models/Complaint.js"></script>
    <script src="src/services/StorageService.js"></script>
    <script src="src/services/AuthService.js"></script>
    <script src="src/services/StudentService.js"></script>
    <script src="src/services/ComplaintService.js"></script>
    <script src="src/utils/validators.js"></script>
    <script src="src/utils/helpers.js"></script>
    <script src="src/app.js"></script>

    <script>
        let allComplaints      = [];
        let allStudents        = [];
        let currentComplaintId = null;

        function initDashboard() {
            const currentUser = App.authService.getCurrentUser();
            if (!currentUser || currentUser.role !== 'admin') {
                Helpers.redirectTo('login.html');
                return;
            }
            loadData();
            setupFilters();
        }

        function loadData() {
            allComplaints = App.complaintService.getAllComplaints();
            allStudents   = App.studentService.getAllStudents();
            updateStatistics();
            displayComplaints(allComplaints);
            displayStudents(allStudents);
        }

        function updateStatistics() {
            const stats = App.complaintService.getStatistics();
            document.getElementById('totalComplaints').textContent      = stats.total;
            document.getElementById('pendingComplaints').textContent    = stats.pending;
            document.getElementById('inProgressComplaints').textContent = stats.inProgress;
            document.getElementById('resolvedComplaints').textContent   = stats.resolved;
            document.getElementById('totalStudents').textContent        = allStudents.length;
        }

        function setupFilters() {
            document.getElementById('searchComplaints').addEventListener('input', filterComplaints);
            document.getElementById('statusFilter').addEventListener('change', filterComplaints);
            document.getElementById('categoryFilter').addEventListener('change', filterComplaints);
            // FIX BUG-05: wire the student search input — was completely missing
            document.getElementById('searchStudents').addEventListener('input', filterStudents);
        }

        function displayComplaints(complaints) {
            const tbody = document.getElementById('complaintsTableBody');

            if (complaints.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-cell">No complaints found</td></tr>';
                return;
            }

            tbody.innerHTML = complaints.map(complaint => {
                // FIX BUG-04: coerce both IDs to String before comparing
                const student = allStudents.find(
                    s => String(s.getId()) === String(complaint.getStudentId())
                );
                return `
                    <tr onclick="viewComplaint(${complaint.getId()})" class="clickable-row">
                        <td>${complaint.getId()}</td>
                                <td>${student ? Validators.sanitize(student.getName()) : 'Unknown'}</td>
                                <td>${Validators.sanitize(complaint.getTitle())}</td>
                                <td>${Validators.sanitize(complaint.getCategory())}</td>
                                <td>
                                    <span class="status-badge" style="background-color: ${Helpers.getStatusColor(Validators.sanitize(complaint.getStatus()))}">
                                        ${Validators.sanitize(complaint.getStatus())}
                                    </span>
                                </td>
                        <td>${Helpers.formatDate(complaint.getCreatedAt())}</td>
                        <td>
                            <button onclick="event.stopPropagation(); viewComplaint(${complaint.getId()})" class="btn-small">View</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function displayStudents(students) {
            const tbody = document.getElementById('studentsTableBody');

            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">No students registered</td></tr>';
                return;
            }

            tbody.innerHTML = students.map(student => {
                // FIX BUG-04: coerce both sides for complaint count too
                const complaintCount = allComplaints.filter(
                    c => String(c.getStudentId()) === String(student.getId())
                ).length;
                return `
                    <tr>
                            <td>${Validators.sanitize(student.getStudentId())}</td>
                            <td>${Validators.sanitize(student.getName())}</td>
                            <td>${Validators.sanitize(student.getEmail())}</td>
                            <td>${Validators.sanitize(student.getDepartment())}</td>
                        <td>${complaintCount}</td>
                        <td>${Helpers.formatDate(student.getCreatedAt())}</td>
                    </tr>
                `;
            }).join('');
        }

        function filterComplaints() {
            const searchTerm     = document.getElementById('searchComplaints').value.toLowerCase();
            const statusFilter   = document.getElementById('statusFilter').value;
            const categoryFilter = document.getElementById('categoryFilter').value;

            let filtered = allComplaints;
            if (searchTerm) {
                filtered = filtered.filter(c =>
                    c.getTitle().toLowerCase().includes(searchTerm) ||
                    c.getDescription().toLowerCase().includes(searchTerm)
                );
            }
            if (statusFilter)   filtered = filtered.filter(c => c.getStatus()   === statusFilter);
            if (categoryFilter) filtered = filtered.filter(c => c.getCategory() === categoryFilter);
            displayComplaints(filtered);
        }

        function filterStudents() {
            const searchTerm = document.getElementById('searchStudents').value.toLowerCase();
            if (!searchTerm) { displayStudents(allStudents); return; }
            const filtered = allStudents.filter(s =>
                s.getName().toLowerCase().includes(searchTerm)      ||
                s.getEmail().toLowerCase().includes(searchTerm)     ||
                s.getStudentId().toLowerCase().includes(searchTerm) ||
                s.getDepartment().toLowerCase().includes(searchTerm)
            );
            displayStudents(filtered);
        }

        function showTab(tab) {
            if (tab === 'complaints') {
                document.getElementById('complaintsSection').style.display = 'block';
                document.getElementById('studentsSection').style.display   = 'none';
                document.getElementById('complaintsTab').classList.add('active');
                document.getElementById('studentsTab').classList.remove('active');
            } else {
                document.getElementById('complaintsSection').style.display = 'none';
                document.getElementById('studentsSection').style.display   = 'block';
                document.getElementById('complaintsTab').classList.remove('active');
                document.getElementById('studentsTab').classList.add('active');
            }
        }

        function viewComplaint(complaintId) {
            const complaint = allComplaints.find(c => c.getId() === complaintId);
            if (!complaint) return;

            currentComplaintId = complaintId;
            // FIX BUG-04: coerce both sides
            const student = allStudents.find(
                s => String(s.getId()) === String(complaint.getStudentId())
            );

            document.getElementById('modalTitle').textContent = Validators.sanitize(complaint.getTitle());
            document.getElementById('modalBody').innerHTML = `
                <div class="modal-detail">
                    <p><strong>Complaint ID:</strong> ${Validators.sanitize(String(complaint.getId()))}</p>
                    <p><strong>Student:</strong> ${student ? Validators.sanitize(student.getName()) : 'Unknown'} (${student ? Validators.sanitize(student.getEmail()) : 'N/A'})</p>
                    <p><strong>Category:</strong> ${Validators.sanitize(complaint.getCategory())}</p>
                    <p><strong>Current Status:</strong>
                        <span class="status-badge" style="background-color: ${Helpers.getStatusColor(Validators.sanitize(complaint.getStatus()))}">
                            ${Validators.sanitize(complaint.getStatus())}
                        </span>
                    </p>
                    <p><strong>Submitted:</strong> ${Helpers.formatDate(complaint.getCreatedAt())}</p>
                    <p><strong>Last Updated:</strong> ${Helpers.formatDate(complaint.getUpdatedAt())}</p>
                    <hr>
                    <p><strong>Description:</strong></p>
                    <p class="complaint-detail-text">${Validators.sanitize(complaint.getDescription())}</p>
                </div>
            `;

            document.getElementById('statusUpdate').value  = Validators.sanitize(complaint.getStatus());
            document.getElementById('adminNotes').value    = Validators.sanitize(complaint.getAdminNotes() || '');
            document.getElementById('complaintModal').style.display = 'flex';
        }

        function updateComplaintStatus() {
            const newStatus  = document.getElementById('statusUpdate').value;
            const adminNotes = document.getElementById('adminNotes').value.trim();

            try {
                App.complaintService.updateComplaintStatus(currentComplaintId, newStatus, adminNotes);
                Helpers.showNotification('Complaint updated successfully', 'success');
                closeComplaintModal();
                loadData();
            } catch (error) {
                Helpers.showNotification(error.message, 'error');
            }
        }

        function deleteComplaint() {
            if (!Helpers.confirmAction('Are you sure you want to delete this complaint? This cannot be undone.')) return;
            try {
                App.complaintService.deleteComplaint(currentComplaintId);
                Helpers.showNotification('Complaint deleted successfully', 'success');
                closeComplaintModal();
                loadData();
            } catch (error) {
                Helpers.showNotification(error.message, 'error');
            }
        }

        function closeComplaintModal() {
            document.getElementById('complaintModal').style.display = 'none';
            // FIX BUG-14: always reset state so stale ID cannot trigger an update
            currentComplaintId = null;
        }

        function exportData() {
                const data = App.storage.exportData();
                Helpers.downloadJSON(data, `complaint-portal-backup-${new Date().toISOString().split('T')[0]}.json`);
            Helpers.showNotification('Data exported successfully', 'success');
        }

        // FIX BUG-14: route backdrop click through closeComplaintModal() for full cleanup
        window.onclick = function(event) {
            const modal = document.getElementById('complaintModal');
            if (event.target === modal) closeComplaintModal();
        };

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
