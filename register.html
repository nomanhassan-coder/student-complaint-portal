<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Complaint Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="register-box">
            <h2>Student Registration</h2>
            <p class="subtitle">Create your account to submit complaints</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="studentId">Student ID *</label>
                    <input type="text" id="studentId" placeholder="e.g., STD-2024-001" required>
                    <small>Minimum 3 characters</small>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="your.email@university.edu" required>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Business">Business</option>
                        <option value="Medical">Medical</option>
                        <option value="Arts">Arts</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+92 300 1234567">
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                    <small>Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="footer-text">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="src/models/User.js"></script>
    <script src="src/models/Student.js"></script>
    <script src="src/models/Complaint.js"></script>
    <script src="src/services/StorageService.js"></script>
    <script src="src/services/AuthService.js"></script>
    <script src="src/services/StudentService.js"></script>
    <script src="src/services/ComplaintService.js"></script>
    <script src="src/utils/validators.js"></script>
    <script src="src/utils/helpers.js"></script>
    <script src="src/app.js"></script>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name            = document.getElementById('name').value.trim();
            const studentId       = document.getElementById('studentId').value.trim();
            const email           = document.getElementById('email').value.trim();
            const department      = document.getElementById('department').value;
            const phone           = document.getElementById('phone').value.trim();
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!Validators.isValidName(name)) {
                Helpers.showNotification('Please enter a valid name (at least 2 characters)', 'error');
                return;
            }

            // FIX BUG-06: validate studentId format before attempting register
            if (!Validators.isValidStudentId(studentId)) {
                Helpers.showNotification('Student ID must be at least 3 characters', 'error');
                return;
            }

            if (!Validators.isValidEmail(email)) {
                Helpers.showNotification('Please enter a valid email address', 'error');
                return;
            }

            if (!Validators.isValidPassword(password)) {
                Helpers.showNotification('Password must be at least 6 characters long', 'error');
                return;
            }

            if (password !== confirmPassword) {
                Helpers.showNotification('Passwords do not match', 'error');
                return;
            }

            if (phone && !Validators.isValidPhone(phone)) {
                Helpers.showNotification('Please enter a valid phone number', 'error');
                return;
            }

            try {
                await App.authService.register(
                    email, password, name, studentId,
                    department || 'Not Specified', phone
                );
                Helpers.showNotification('Registration successful! Please login.', 'success');
                setTimeout(() => Helpers.redirectTo('login.html'), 1500);
            } catch (error) {
                Helpers.showNotification(error.message, 'error');
            }
        });

        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password        = document.getElementById('password').value;
            const confirmPassword = this.value;
            if (confirmPassword.length > 0) {
                this.style.borderColor = password === confirmPassword ? '#4CAF50' : '#f44336';
            }
        });
    </script>
</body>
</html>
